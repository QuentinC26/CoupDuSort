<main class="main">
  <div class="content">
    <p>Navigation au dessus</p>
      <p>Bienvenue sur Coup du Sort !!</p>
      <p>Choissisez le thème qui vous plait et lancer votre tirage au sort !!</p>
  </div>
     <h3>Créer Votre liste</h3>
    <textarea [(ngModel)]="newParticipants"
          placeholder="Un participant par ligne">
    </textarea>

    <button (click)="creerListe()">
      Créer
    </button>
    <p>{{ addSucess }}</p>

    <h3>Créer un tirage</h3>

    <button (click)="faireTirage()">
      Lancer le tirage
    </button>

    <div *ngIf="resultat">
      <h3>Résultat :</h3>
      <p>{{ resultat }}</p>
   </div>
</main>

<router-outlet />
